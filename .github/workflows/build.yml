name: Build Windows Desktop Pet

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Cubism Web Core
        run: node scripts/download-cubism-core.js
        shell: bash

      - name: Verify Cubism Core files
        run: |
          if (!(Test-Path "cubism-core/live2dcubismcore.min.js")) {
            Write-Error "Cubism Core JS not found"
            exit 1
          }

      - name: Build renderer bundle
        run: npx esbuild src/renderer.js --bundle --outfile=dist/renderer.js --platform=browser

      - name: Build Windows packages (installer + portable)
        run: npx electron-builder --win --x64 --publish=never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CialloForDesktop-Build
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CialloForDesktop-Build
          path: release

      - name: List release files
        run: ls -lh release/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.zip
          generate_release_notes: true
          draft: true

  publish-package:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
      - run: npm ci
      - run: |
          echo "Publishing @yttbz/ciallo-for-desktop to GitHub Packages..."
          npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
