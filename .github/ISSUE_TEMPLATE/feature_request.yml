name: Feature Request
description: 建议一个新功能
title: "[Feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        感谢您的建议！
  - type: textarea
    id: problem
    attributes:
      label: 相关的问题
      description: 这个功能请求是否与某个问题相关？
  - type: textarea
    id: solution
    attributes:
      label: 解决方案
      description: 你期望的解决方案是什么？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 你还考虑过哪些替代方案？
  - type: textarea
    id: context
    attributes:
      label: 额外信息
      description: 添加任何其他相关信息
