name: Bug Report
description: 报告一个 Bug
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        谢谢您花时间报告这个问题！
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请清晰简洁地描述这个 Bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 打开应用
        2. 点击...
        3. 出现错误
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么？
  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果适用，请添加截图
  - type: input
    id: version
    attributes:
      label: 版本
      description: 你使用的是哪个版本？
      placeholder: "v1.0.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows 10
        - Windows 11
        - 其他
    validations:
      required: true
