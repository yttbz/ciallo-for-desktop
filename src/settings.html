<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>CialloForDesktop 设置</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">⚙️ 设置</div>
      </div>
      <div class="sidebar-nav" id="sidebarNav">
        <button class="sidebar-item active" data-tab="window">
          <span class="sidebar-icon">📌</span>
          <span class="sidebar-label">窗口</span>
        </button>
        <button class="sidebar-item" data-tab="size">
          <span class="sidebar-icon">📏</span>
          <span class="sidebar-label">大小</span>
        </button>
        <button class="sidebar-item" data-tab="general">
          <span class="sidebar-icon">⚙️</span>
          <span class="sidebar-label">通用</span>
        </button>
        <button class="sidebar-item" data-tab="hud">
          <span class="sidebar-icon">📊</span>
          <span class="sidebar-label">HUD</span>
        </button>
        <button class="sidebar-item" data-tab="sessionHud">
          <span class="sidebar-icon">🖥️</span>
          <span class="sidebar-label">会话 HUD</span>
        </button>
        <button class="sidebar-item" data-tab="claude">
          <span class="sidebar-icon">🤖</span>
          <span class="sidebar-label">Claude Code</span>
        </button>
        <button class="sidebar-item" data-tab="ssh">
          <span class="sidebar-icon">🔌</span>
          <span class="sidebar-label">SSH</span>
        </button>
        <button class="sidebar-item" data-tab="agents">
          <span class="sidebar-icon">👤</span>
          <span class="sidebar-label">Agent</span>
        </button>
        <button class="sidebar-item" data-tab="shortcuts">
          <span class="sidebar-icon">⌨️</span>
          <span class="sidebar-label">快捷键</span>
        </button>
        <button class="sidebar-item" data-tab="tray">
          <span class="sidebar-icon">🧩</span>
          <span class="sidebar-label">托盘</span>
        </button>
        <button class="sidebar-item" data-tab="about">
          <span class="sidebar-icon">💖</span>
          <span class="sidebar-label">关于</span>
        </button>
      </div>
    </nav>

    <!-- 内容区域 -->
    <main class="content" id="content"></main>
  </div>

  <script src="settings-renderer.js"></script>
</body>
</html>
