appId: com.yttbz.ciallo-for-desktop
productName: "Ciallo~(∠?w< )"
copyright: "Copyright (c) 2024 yttbz"

directories:
  output: dist
  buildResources: build

files:
  - main/**/*
  - dist/**/*
  - src/index.html
  - src/style.css
  - src/settings.html
  - src/settings.css
  - src/settings-renderer.js
  - assets/**/*
  - cubism-core/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
    - target: zip
      arch:
        - x64
  icon: build/icon.ico
  artifactName: CialloForDesktop-${version}-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  artifactName: CialloForDesktop-${version}-Setup.${ext}
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Ciallo~(∠?w< )"

portable:
  artifactName: CialloForDesktop-${version}-Portable.${ext}
